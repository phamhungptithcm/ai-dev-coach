name: Weekly Staging to Main Sync

on:
  schedule:
    - cron: "0 15 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect staging updates
        id: diff
        run: |
          set -euo pipefail
          git fetch origin main staging
          ahead=$(git rev-list --count origin/main..origin/staging)
          echo "ahead=${ahead}" >> "$GITHUB_OUTPUT"
          if [ "${ahead}" -eq 0 ]; then
            echo "No updates to sync from staging to main."
          else
            echo "Staging is ${ahead} commit(s) ahead of main."
          fi

      - name: Create or reuse sync PR
        if: steps.diff.outputs.ahead != '0'
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          pr_number=$(gh pr list --base main --head staging --state open --json number --jq '.[0].number' || true)

          if [ -n "${pr_number}" ]; then
            echo "Found existing sync PR #${pr_number}"
          else
            url=$(gh pr create \
              --base main \
              --head staging \
              --title "chore(sync): weekly staging -> main" \
              --body "Automated weekly sync from \`staging\` into \`main\`.\n\n- Created by workflow: \`Weekly Staging to Main Sync\`\n- Merge strategy: merge commit")
            pr_number=$(echo "${url}" | awk -F'/' '{print $NF}')
            echo "Created sync PR #${pr_number}"
          fi

          echo "number=${pr_number}" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge (respect branch protections)
        if: steps.diff.outputs.ahead != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh pr merge "${{ steps.pr.outputs.number }}" --auto --merge || \
            echo "::warning::Could not enable auto-merge with default token."

      - name: Admin merge fallback (optional)
        if: steps.diff.outputs.ahead != '0' && secrets.REPO_ADMIN_TOKEN != ''
        env:
          GH_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          gh pr merge "${{ steps.pr.outputs.number }}" --merge --admin || \
            echo "::warning::Admin merge fallback did not run (checks/restrictions may still block)."

      - name: Report missing admin token
        if: steps.diff.outputs.ahead != '0' && secrets.REPO_ADMIN_TOKEN == ''
        run: |
          echo "::warning::REPO_ADMIN_TOKEN is not set. Weekly sync PR was created/reused and auto-merge was requested, but admin fallback merge is disabled."
