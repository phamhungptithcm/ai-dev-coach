name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - staging

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-docs.txt

      - name: Install docs dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements-docs.txt

      - name: Validate extension package structure
        run: node scripts/validate-extension.mjs

      - name: Validate extension JavaScript syntax
        run: |
          set -euo pipefail
          for f in $(find extension -type f -name '*.js' | sort); do
            node --check "$f"
          done

      - name: Validate extension manifest JSON
        run: python3 -m json.tool extension/manifest.json >/dev/null

      - name: Fail on junk files
        run: |
          set -euo pipefail
          if find . -type f -name '.DS_Store' | grep -q .; then
            echo "::error::Found .DS_Store files in repository:"
            find . -type f -name '.DS_Store'
            exit 1
          fi

      - name: Build MkDocs site (strict)
        run: python3 -m mkdocs build --strict
