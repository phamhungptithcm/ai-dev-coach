name: Publish Extension Release

on:
  push:
    branches: ["main"]
    paths:
      - "extension/manifest.json"
  workflow_dispatch:
    inputs:
      publish_to_cws:
        description: "Publish release to Chrome Web Store"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: publish-extension-release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      PUBLISH_TO_CWS: ${{ github.event_name != 'workflow_dispatch' || inputs.publish_to_cws }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Validate extension package structure
        run: node scripts/validate-extension.mjs

      - name: Resolve release version
        id: version
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./extension/manifest.json').version")
          if ! printf '%s' "${VERSION}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Manifest version must be semantic version format (x.y.z)."
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate Chrome Web Store secrets
        if: env.PUBLISH_TO_CWS == 'true'
        env:
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CWS_PUBLISHER_ID: ${{ secrets.CWS_PUBLISHER_ID }}
        run: |
          set -euo pipefail
          missing=()
          [ -z "${CWS_CLIENT_ID:-}" ] && missing+=("CWS_CLIENT_ID")
          [ -z "${CWS_CLIENT_SECRET:-}" ] && missing+=("CWS_CLIENT_SECRET")
          [ -z "${CWS_REFRESH_TOKEN:-}" ] && missing+=("CWS_REFRESH_TOKEN")
          [ -z "${CWS_EXTENSION_ID:-}" ] && missing+=("CWS_EXTENSION_ID")
          [ -z "${CWS_PUBLISHER_ID:-}" ] && missing+=("CWS_PUBLISHER_ID")

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Chrome Web Store publish is required but missing secrets: ${missing[*]}"
            exit 1
          fi

      - name: Create and push release tag if missing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags --force
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists."
            exit 0
          fi
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

      - name: Package extension
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist
          cd extension
          zip -r "../dist/ai-dev-coach-${VERSION}.zip" . -x "*.DS_Store" -x "__MACOSX/*"
          cd ..
          unzip -l "dist/ai-dev-coach-${VERSION}.zip" | grep -q "manifest.json"

      - name: Generate friendly release notes
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          RELEASE_NOTES_PATH: dist/release-notes.md
        run: node scripts/generate-friendly-release-notes.mjs

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          ZIP_FILE="dist/ai-dev-coach-${VERSION}.zip"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${ZIP_FILE}" --clobber
            gh release edit "${TAG}" --title "AI Dev Coach ${TAG}" --notes-file dist/release-notes.md
          else
            gh release create "${TAG}" "${ZIP_FILE}" --title "AI Dev Coach ${TAG}" --notes-file dist/release-notes.md
          fi

      - name: Upload and publish to Chrome Web Store
        id: cws
        if: env.PUBLISH_TO_CWS == 'true'
        env:
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CWS_PUBLISHER_ID: ${{ secrets.CWS_PUBLISHER_ID }}
          CWS_PUBLISH_TARGET: ${{ secrets.CWS_PUBLISH_TARGET }}
          ZIP_FILE: dist/ai-dev-coach-${{ steps.version.outputs.version }}.zip
        run: |
          set -euo pipefail
          echo "status=publishing" >> "$GITHUB_OUTPUT"

          TOKEN_RESPONSE=$(curl --fail-with-body -sS https://oauth2.googleapis.com/token \
            -d "client_id=${CWS_CLIENT_ID}" \
            -d "client_secret=${CWS_CLIENT_SECRET}" \
            -d "refresh_token=${CWS_REFRESH_TOKEN}" \
            -d "grant_type=refresh_token")

          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("access_token",""))')
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "::error::Failed to get access token from OAuth response"
            exit 1
          fi

          PUBLISH_TARGET="${CWS_PUBLISH_TARGET:-default}"
          UPLOAD_URL="https://chromewebstore.googleapis.com/upload/v2/publishers/${CWS_PUBLISHER_ID}/items/${CWS_EXTENSION_ID}:upload"
          STATUS_URL="https://chromewebstore.googleapis.com/v2/publishers/${CWS_PUBLISHER_ID}/items/${CWS_EXTENSION_ID}:fetchStatus"
          PUBLISH_URL="https://chromewebstore.googleapis.com/v2/publishers/${CWS_PUBLISHER_ID}/items/${CWS_EXTENSION_ID}:publish?publishTarget=${PUBLISH_TARGET}"

          upload_raw=$(curl --silent --show-error --write-out '\nHTTP_STATUS:%{http_code}\n' -X POST \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -T "${ZIP_FILE}" \
            "${UPLOAD_URL}")

          upload_status=$(printf '%s\n' "${upload_raw}" | sed -n 's/^HTTP_STATUS://p' | tail -n1)
          upload_body=$(printf '%s\n' "${upload_raw}" | sed '$d')

          if [ "${upload_status}" -ge 400 ]; then
            if printf '%s' "${upload_body}" | grep -qi "in review"; then
              echo "::notice::Chrome Web Store item is currently in review. GitHub release is ready, but store publish must wait until review completes."
              echo "status=deferred_in_review" >> "$GITHUB_OUTPUT"
            else
              echo "::error::Chrome Web Store upload failed: ${upload_body}"
              echo "status=failed_upload" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            exit 0
          fi

          final_upload_state=$(printf '%s' "${upload_body}" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("uploadState",""))')
          if [ -z "${final_upload_state}" ]; then
            echo "::error::Upload response missing uploadState"
            echo "status=failed_upload_state" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "${final_upload_state}" = "UPLOAD_IN_PROGRESS" ]; then
            for attempt in $(seq 1 18); do
              status_response=$(curl --fail-with-body -sS \
                -H "Authorization: Bearer ${ACCESS_TOKEN}" \
                "${STATUS_URL}")
              final_upload_state=$(printf '%s' "${status_response}" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("uploadState",""))')
              echo "Upload polling attempt ${attempt}: ${final_upload_state}"
              if [ "${final_upload_state}" = "SUCCESS" ]; then
                break
              fi
              if [ "${final_upload_state}" != "UPLOAD_IN_PROGRESS" ]; then
                echo "::error::Unexpected uploadState while polling: ${final_upload_state}"
                echo "${status_response}"
                echo "status=failed_upload_state" >> "$GITHUB_OUTPUT"
                exit 1
              fi
              sleep 10
            done
          fi

          if [ "${final_upload_state}" != "SUCCESS" ]; then
            echo "::error::Upload did not reach SUCCESS. Final uploadState=${final_upload_state}"
            echo "status=failed_upload_state" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          publish_raw=$(curl --silent --show-error --write-out '\nHTTP_STATUS:%{http_code}\n' -X POST \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            "${PUBLISH_URL}")

          publish_status=$(printf '%s\n' "${publish_raw}" | sed -n 's/^HTTP_STATUS://p' | tail -n1)
          publish_body=$(printf '%s\n' "${publish_raw}" | sed '$d')

          if [ "${publish_status}" -ge 400 ]; then
            if printf '%s' "${publish_body}" | grep -qi "in review"; then
              echo "::notice::Chrome Web Store accepted the release package, but publish is deferred while the item remains in review."
              echo "status=deferred_in_review" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::error::Chrome Web Store publish failed: ${publish_body}"
            echo "status=failed_publish" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "Publish response: ${publish_body}"
          echo "status=published" >> "$GITHUB_OUTPUT"

      - name: Write release summary
        if: always()
        run: |
          {
            echo "## Extension release summary"
            echo ""
            echo "- Version: \`${{ steps.version.outputs.version }}\`"
            echo "- Tag: \`${{ steps.version.outputs.tag }}\`"
            echo "- GitHub release: completed"
            if [ "${PUBLISH_TO_CWS}" != "true" ]; then
              echo "- Chrome Web Store: skipped by workflow input"
            else
              case "${{ steps.cws.outputs.status }}" in
                published)
                  echo "- Chrome Web Store: published successfully"
                  ;;
                deferred_in_review)
                  echo "- Chrome Web Store: deferred because the item is currently in review"
                  ;;
                "")
                  echo "- Chrome Web Store: not reached"
                  ;;
                *)
                  echo "- Chrome Web Store: failed (\`${{ steps.cws.outputs.status }}\`)"
                  ;;
              esac
            fi
          } >> "$GITHUB_STEP_SUMMARY"
