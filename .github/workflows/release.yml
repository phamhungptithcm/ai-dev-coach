name: Release

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve version from manifest
        id: version
        run: |
          VERSION=$(node -p "require('./extension/manifest.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check if release tag already exists
        id: tag_check
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push release tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Package extension
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd extension
          zip -r "../ai-dev-coach-${VERSION}.zip" .

      - name: Create GitHub release with notes
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: AI Dev Coach ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: ai-dev-coach-${{ steps.version.outputs.version }}.zip

      - name: Evaluate Chrome Web Store secret readiness
        if: steps.tag_check.outputs.exists == 'false'
        id: cws_ready
        env:
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CWS_PUBLISHER_ID: ${{ secrets.CWS_PUBLISHER_ID }}
        run: |
          set -euo pipefail
          missing=()
          [ -z "${CWS_CLIENT_ID:-}" ] && missing+=("CWS_CLIENT_ID")
          [ -z "${CWS_CLIENT_SECRET:-}" ] && missing+=("CWS_CLIENT_SECRET")
          [ -z "${CWS_REFRESH_TOKEN:-}" ] && missing+=("CWS_REFRESH_TOKEN")
          [ -z "${CWS_EXTENSION_ID:-}" ] && missing+=("CWS_EXTENSION_ID")
          [ -z "${CWS_PUBLISHER_ID:-}" ] && missing+=("CWS_PUBLISHER_ID")

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping Chrome Web Store publish. Missing secrets: ${missing[*]}"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload and publish to Chrome Web Store
        if: steps.tag_check.outputs.exists == 'false' && steps.cws_ready.outputs.ready == 'true'
        env:
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CWS_PUBLISHER_ID: ${{ secrets.CWS_PUBLISHER_ID }}
          ZIP_FILE: ai-dev-coach-${{ steps.version.outputs.version }}.zip
        run: |
          set -euo pipefail

          TOKEN_RESPONSE=$(curl --fail-with-body -sS https://oauth2.googleapis.com/token \
            -d "client_id=${CWS_CLIENT_ID}" \
            -d "client_secret=${CWS_CLIENT_SECRET}" \
            -d "refresh_token=${CWS_REFRESH_TOKEN}" \
            -d "grant_type=refresh_token")

          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("access_token",""))')
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "::error::Failed to get access token from OAuth response"
            exit 1
          fi

          UPLOAD_URL="https://chromewebstore.googleapis.com/upload/v2/publishers/${CWS_PUBLISHER_ID}/items/${CWS_EXTENSION_ID}:upload"
          STATUS_URL="https://chromewebstore.googleapis.com/v2/publishers/${CWS_PUBLISHER_ID}/items/${CWS_EXTENSION_ID}:fetchStatus"
          PUBLISH_URL="https://chromewebstore.googleapis.com/v2/publishers/${CWS_PUBLISHER_ID}/items/${CWS_EXTENSION_ID}:publish"

          UPLOAD_RESPONSE=$(curl --fail-with-body -sS -X POST \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -T "${ZIP_FILE}" \
            "${UPLOAD_URL}")
          echo "Upload response: ${UPLOAD_RESPONSE}"

          FINAL_UPLOAD_STATE=$(echo "$UPLOAD_RESPONSE" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("uploadState",""))')
          if [ -z "$FINAL_UPLOAD_STATE" ]; then
            echo "::error::Upload response missing uploadState"
            exit 1
          fi

          if [ "$FINAL_UPLOAD_STATE" = "UPLOAD_IN_PROGRESS" ]; then
            for attempt in $(seq 1 18); do
              STATUS_RESPONSE=$(curl --fail-with-body -sS \
                -H "Authorization: Bearer ${ACCESS_TOKEN}" \
                "${STATUS_URL}")
              FINAL_UPLOAD_STATE=$(echo "$STATUS_RESPONSE" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("uploadState",""))')
              echo "Upload polling attempt ${attempt}: ${FINAL_UPLOAD_STATE}"
              if [ "$FINAL_UPLOAD_STATE" = "SUCCESS" ]; then
                break
              fi
              if [ "$FINAL_UPLOAD_STATE" != "UPLOAD_IN_PROGRESS" ]; then
                echo "::error::Unexpected uploadState while polling: ${FINAL_UPLOAD_STATE}"
                echo "${STATUS_RESPONSE}"
                exit 1
              fi
              sleep 10
            done
          fi

          if [ "$FINAL_UPLOAD_STATE" != "SUCCESS" ]; then
            echo "::error::Upload did not reach SUCCESS. Final uploadState=${FINAL_UPLOAD_STATE}"
            exit 1
          fi

          PUBLISH_RESPONSE=$(curl --fail-with-body -sS -X POST \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            "${PUBLISH_URL}")
          echo "Publish response: ${PUBLISH_RESPONSE}"
