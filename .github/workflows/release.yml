name: Release

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      publish_to_cws:
        description: "Publish release to Chrome Web Store"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      BUMP_TYPE: ${{ github.event_name == 'workflow_dispatch' && inputs.bump || 'patch' }}
      PUBLISH_TO_CWS: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_to_cws || 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate extension package structure
        run: node scripts/validate-extension.mjs

      - name: Resolve next release version
        id: version
        run: |
          set -euo pipefail
          git fetch --tags --force

          latest_tag=$(git tag --list 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1 || true)
          if [ -z "${latest_tag}" ]; then
            major=1
            minor=2
            patch=0
          else
            version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<<"${version}"
          fi

          case "${BUMP_TYPE}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch|*)
              patch=$((patch + 1))
              ;;
          esac

          NEXT_VERSION="${major}.${minor}.${patch}"
          VERSION=$(node -p "require('./extension/manifest.json').version")
          if [ "$VERSION" != "$NEXT_VERSION" ]; then
            echo "Current manifest version: ${VERSION}"
            echo "Next release version: ${NEXT_VERSION}"
          fi

          echo "version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEXT_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate Chrome Web Store secrets
        if: env.PUBLISH_TO_CWS == 'true'
        env:
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CWS_PUBLISHER_ID: ${{ secrets.CWS_PUBLISHER_ID }}
        run: |
          set -euo pipefail
          missing=()
          [ -z "${CWS_CLIENT_ID:-}" ] && missing+=("CWS_CLIENT_ID")
          [ -z "${CWS_CLIENT_SECRET:-}" ] && missing+=("CWS_CLIENT_SECRET")
          [ -z "${CWS_REFRESH_TOKEN:-}" ] && missing+=("CWS_REFRESH_TOKEN")
          [ -z "${CWS_EXTENSION_ID:-}" ] && missing+=("CWS_EXTENSION_ID")
          [ -z "${CWS_PUBLISHER_ID:-}" ] && missing+=("CWS_PUBLISHER_ID")

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Chrome Web Store publish is required but missing secrets: ${missing[*]}"
            exit 1
          fi

      - name: Bump version files
        run: |
          set -euo pipefail
          NEXT_VERSION="${{ steps.version.outputs.version }}"
          node -e "
            const fs = require('fs');
            const manifestPath = 'extension/manifest.json';
            const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
            manifest.version = process.argv[1];
            fs.writeFileSync(manifestPath, JSON.stringify(manifest, null, 2) + '\n');
          " "${NEXT_VERSION}"

          python3 - <<'PY'
          import re
          from pathlib import Path
          path = Path("docs/index.md")
          text = path.read_text(encoding="utf-8")
          version = "${{ steps.version.outputs.tag }}"
          updated = re.sub(
              r"(\*\*Current development version:\*\*\s*`)(v\d+\.\d+\.\d+)(`)",
              lambda m: f"{m.group(1)}{version}{m.group(3)}",
              text,
              count=1,
          )
          if updated != text:
              path.write_text(updated, encoding="utf-8")
          PY

      - name: Commit and push release bump
        id: release_commit
        run: |
          set -euo pipefail
          NEXT_VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add extension/manifest.json docs/index.md
          if git diff --cached --quiet; then
            echo "No version changes detected; skipping release."
            echo "skip_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore(release): cut v${NEXT_VERSION}"
          git push origin HEAD:main
          echo "skip_release=false" >> "$GITHUB_OUTPUT"

      - name: Create and push release tag
        if: steps.release_commit.outputs.skip_release == 'false'
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Package extension
        if: steps.release_commit.outputs.skip_release == 'false'
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist
          cd extension
          zip -r "../dist/ai-dev-coach-${VERSION}.zip" . -x "*.DS_Store" -x "__MACOSX/*"
          cd ..
          unzip -l "dist/ai-dev-coach-${VERSION}.zip" | grep -q "manifest.json"

      - name: Create GitHub release with notes
        if: steps.release_commit.outputs.skip_release == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: AI Dev Coach ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: dist/ai-dev-coach-${{ steps.version.outputs.version }}.zip

      - name: Upload and publish to Chrome Web Store
        if: steps.release_commit.outputs.skip_release == 'false' && env.PUBLISH_TO_CWS == 'true'
        env:
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CWS_PUBLISHER_ID: ${{ secrets.CWS_PUBLISHER_ID }}
          CWS_PUBLISH_TARGET: ${{ secrets.CWS_PUBLISH_TARGET }}
          ZIP_FILE: dist/ai-dev-coach-${{ steps.version.outputs.version }}.zip
        run: |
          set -euo pipefail

          TOKEN_RESPONSE=$(curl --fail-with-body -sS https://oauth2.googleapis.com/token \
            -d "client_id=${CWS_CLIENT_ID}" \
            -d "client_secret=${CWS_CLIENT_SECRET}" \
            -d "refresh_token=${CWS_REFRESH_TOKEN}" \
            -d "grant_type=refresh_token")

          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("access_token",""))')
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "::error::Failed to get access token from OAuth response"
            exit 1
          fi

          PUBLISH_TARGET="${CWS_PUBLISH_TARGET:-default}"
          UPLOAD_URL="https://chromewebstore.googleapis.com/upload/v2/publishers/${CWS_PUBLISHER_ID}/items/${CWS_EXTENSION_ID}:upload"
          STATUS_URL="https://chromewebstore.googleapis.com/v2/publishers/${CWS_PUBLISHER_ID}/items/${CWS_EXTENSION_ID}:fetchStatus"
          PUBLISH_URL="https://chromewebstore.googleapis.com/v2/publishers/${CWS_PUBLISHER_ID}/items/${CWS_EXTENSION_ID}:publish?publishTarget=${PUBLISH_TARGET}"

          UPLOAD_RESPONSE=$(curl --fail-with-body -sS -X POST \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -T "${ZIP_FILE}" \
            "${UPLOAD_URL}")
          echo "Upload response: ${UPLOAD_RESPONSE}"

          FINAL_UPLOAD_STATE=$(echo "$UPLOAD_RESPONSE" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("uploadState",""))')
          if [ -z "$FINAL_UPLOAD_STATE" ]; then
            echo "::error::Upload response missing uploadState"
            exit 1
          fi

          if [ "$FINAL_UPLOAD_STATE" = "UPLOAD_IN_PROGRESS" ]; then
            for attempt in $(seq 1 18); do
              STATUS_RESPONSE=$(curl --fail-with-body -sS \
                -H "Authorization: Bearer ${ACCESS_TOKEN}" \
                "${STATUS_URL}")
              FINAL_UPLOAD_STATE=$(echo "$STATUS_RESPONSE" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("uploadState",""))')
              echo "Upload polling attempt ${attempt}: ${FINAL_UPLOAD_STATE}"
              if [ "$FINAL_UPLOAD_STATE" = "SUCCESS" ]; then
                break
              fi
              if [ "$FINAL_UPLOAD_STATE" != "UPLOAD_IN_PROGRESS" ]; then
                echo "::error::Unexpected uploadState while polling: ${FINAL_UPLOAD_STATE}"
                echo "${STATUS_RESPONSE}"
                exit 1
              fi
              sleep 10
            done
          fi

          if [ "$FINAL_UPLOAD_STATE" != "SUCCESS" ]; then
            echo "::error::Upload did not reach SUCCESS. Final uploadState=${FINAL_UPLOAD_STATE}"
            exit 1
          fi

          PUBLISH_RESPONSE=$(curl --fail-with-body -sS -X POST \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            "${PUBLISH_URL}")
          echo "Publish response: ${PUBLISH_RESPONSE}"
