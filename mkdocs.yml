site_name: AI Dev Coach Docs
repo_name: ai-dev-coach
repo_url: https://github.com/phamhungptithcm/ai-dev-coach
edit_uri: edit/staging/docs/
site_url: https://phamhungptithcm.github.io/ai-dev-coach/

theme:
  name: material
  logo: assets/qh-logo.svg
  favicon: assets/qh-favicon.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.suggest

plugins:
  - search

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

copyright: "© 2026 AI Dev Coach. All rights reserved."
extra_css:
  - stylesheets/extra.css
extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js
  - javascripts/release-sync.js

nav:
  - Home: index.md
  - Overview:
      - Problem: 00-overview/problem.md
      - Philosophy: 00-overview/philosophy.md
      - Vision: 00-overview/vision.md
  - Extensions:
      - Chrome Extension: 01-extensions/chrome-extension.md
      - VS Code Extension (Planned): 01-extensions/vscode-extension.md
      - IntelliJ Plugin (Planned): 01-extensions/intellij-plugin.md
  - Product:
      - Feature Specification: 08-product/feature-spec.md
      - Learning Analytics: 08-product/learning-analytics.md
      - Prompt Builder System: 08-product/prompt-builder-system.md
      - User Flow: 08-product/user-flow.md
  - Architecture:
      - Extension Architecture: 01-architecture/extension-architecture.md
      - AI Coaching Engine: 01-architecture/ai-coaching-engine.md
      - Runtime Design: 01-architecture/system-design.md
  - Security:
      - Privacy Model: 02-security/privacy-model.md
  - Delivery:
      - CI/CD Pipeline: 03-deployment/ci-cd.md
      - Chrome Web Store: 03-deployment/chrome-store.md
  - Operations:
      - Monitoring: 05-operations/monitoring.md
  - Project:
      - Branching Strategy: 07-project/branching-strategy.md
      - Roadmap: 07-project/roadmap.md
      - Sprint Plan: 07-project/sprint-plan.md
      - Changelog: 07-project/changelog.md
  - References:
      - Research: 06-references/research.md
